benchmark:
  name: swebench_lite
  split: test
  limit: 5            # for quick dev runs

llm:
  provider: local                               # or openai
  model: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M    # gpt-5-mini
  base_url: http://localhost:11434/v1           # null

gatherers:
  - name: react_agent
    llm: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
    n_samples: 5

k_values: [1, 3, 5, 10]

dashboard:
  enabled: true
  port: 8765

output_dir: ./results
