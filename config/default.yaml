benchmark:
  name: swebench_lite
  split: test
  limit: 50            # for quick dev runs
  # Gold set strategy: patch_only | patch_and_tests | patch_tests_and_imports
  gold_context_strategy: patch_and_tests

llm:
  provider: local                               # or openai
  model: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M                             # gpt-5-mini
  base_url: http://localhost:11434/v1           # null

gatherers:
  - name: rag_dense
    model: all-MiniLM-L6-v2
    top_k: 10
  - name: rag_bm25
    top_k: 10
  - name: react_agent
    llm: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
    max_steps: 15
  - name: agentless
    llm: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
    n_samples: 5

k_values: [1, 3, 5, 10]

dashboard:
  enabled: true
  port: 8765

output_dir: ./results
