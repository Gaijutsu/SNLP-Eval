benchmark:
  name: swebench_lite
  split: test
  limit: 5
  gold_context_strategy: patch_and_tests

llm:
  provider: local
  model: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
  base_url: http://localhost:11434/v1

gatherers:
  - name: rag_bm25
    top_k: 10
  - name: agentic_bm25
    llm: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
    max_steps: 15
    bm25_top_k: 10
  - name: react_agent
    llm: hf.co/unsloth/Qwen3-8B-GGUF:Q4_K_M
    max_steps: 15

k_values: [1, 3, 5, 10]

dashboard:
  enabled: true
  port: 8765

output_dir: ./results
